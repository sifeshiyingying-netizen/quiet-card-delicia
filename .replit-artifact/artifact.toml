kind = "web"
previewPath = "/"
title = "Delicia Quiet Card"
version = "1.0.0"
id = "artifacts/delicia-quiet-card"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24449

[services.development]
run = "pnpm --filter @workspace/delicia-quiet-card run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/delicia-quiet-card", "run", "build" ]
publicDir = "artifacts/delicia-quiet-card/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24449"
BASE_PATH = "/"
